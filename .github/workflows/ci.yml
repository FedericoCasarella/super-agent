name: CI · Polpo Brain

on:
  push:
    branches: [polpo-fork, polpo-overlay, 'contrib/**']
  pull_request:
    branches: [polpo-fork, main]

# Cancel superseded runs on the same ref (saves CI minutes on rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: tsc build must pass clean. Fails the matrix on any error.
  # ─────────────────────────────────────────────────────────────────────────
  backend-build:
    name: Backend · tsc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Build backend
        # tsc only type-checks + emits; config.ts is not executed here so
        # JWT_SECRET is not required at build time (fail-fast triggers only
        # when the runtime imports config). Smoke job exercises the runtime.
        run: npm run build -w backend

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: vite build must produce a bundle. Pre-existing tsc errors in
  # BrainGraph3DConstellation are upstream multi-vault drift (tracked, not
  # blocking); vite/esbuild bundles regardless.
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend · vite build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Build frontend (vite)
        working-directory: frontend
        run: npx vite build

  # ─────────────────────────────────────────────────────────────────────────
  # Smoke: full boot + public-surface assertions against a real Postgres.
  # Exercises auth gate, rate-limit header, bootstrap endpoint shape.
  # ─────────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke · boot + auth gate + rate-limit
    runs-on: ubuntu-latest
    needs: backend-build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: polpo_brain_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d polpo_brain_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Migrate DB
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/polpo_brain_ci
          JWT_SECRET: ci-smoke-test-jwt-secret-32-chars-minimum-for-fail-fast
        run: npm run db:migrate

      - name: Run smoke.sh
        env:
          DATABASE_URL: postgres://ci:ci@localhost:5432/polpo_brain_ci
          JWT_SECRET: ci-smoke-test-jwt-secret-32-chars-minimum-for-fail-fast
          PORT: '8789'
          SKIP_BUILD: '1' # backend-build job already validated tsc
        run: |
          npm run build -w backend
          ./scripts/smoke.sh

  # ─────────────────────────────────────────────────────────────────────────
  # Audit: surface known npm advisories without failing the pipeline on
  # transitive low/moderate vulns (npm-audit policy is too noisy for a
  # blocking gate, but the report is valuable for review).
  # ─────────────────────────────────────────────────────────────────────────
  audit:
    name: Security · npm audit (non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install workspaces
        run: npm ci

      - name: Audit backend
        continue-on-error: true
        working-directory: backend
        run: npm audit --omit=dev --audit-level=high

      - name: Audit frontend
        continue-on-error: true
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high
